<!DOCTYPE html>
<html>
<head>
  <title>POS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- jQuery (optional for Bootstrap 4, not needed for Bootstrap 5) -->
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- jQuery (if not already included) -->
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  
  <!-- Toastr CSS -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css" rel="stylesheet">
  
  <!-- Toastr JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/pos.js"></script>
  
</head>
<body>

<div class="container py-3">

  <select id="sel-products" class="form-select mb-3"></select>

  <div id="div-added-items" class="mb-3"></div>

  <input type="number" id="inp-amount-due" class="form-control mb-2" placeholder="Amount Due" readonly>
  <input type="number" id="inp-cash-received" class="form-control mb-2" placeholder="Cash Received">
  <input type="number" id="inp-changed" class="form-control mb-3" placeholder="Changed" readonly>

  <button id="btn-cash" class="btn btn-success w-100 mb-2">Cash</button>
  <button id="btn-credit" class="btn btn-secondary w-100">Credit</button>

</div>

<div class="modal fade" id="mdl-add-item">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 id="lbl-item-title"></h5>
      </div>

      <div class="modal-body">
        <div class="row mb-3">
          <div class="col">
            <label for="inp-stock-on-hand" class="form-label">Stock on Hand</label>
            <input type="hidden" id="inp-id" class="form-control">
            <input type="number" id="inp-stock-on-hand" class="form-control text-center" readonly disabled>
          </div>
          <div class="col">
            <label for="inp-selling-price" class="form-label">Selling Price</label>
            <input type="number" id="inp-selling-price" class="form-control text-center" readonly disabled>
          </div>
        </div>

        <div class="row mb-3 align-items-center">
          <label for="inp-quantity" class="form-label">Quantity</label>
          <div class="input-group input-group-lg"> <!-- Larger input group -->
            <button class="btn btn-outline-secondary btn-lg" type="button" id="btn-decrease">-</button>
            <input type="number" id="inp-quantity" class="form-control text-center" 
                   placeholder="Quantity" value="1" min="1" style="font-size:1.5rem; height:60px;" required>
            <button class="btn btn-outline-secondary btn-lg" type="button" id="btn-increase">+</button>
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button id="btn-add-item" class="btn btn-primary">Add</button>
      </div>

    </div>
  </div>
</div>

</body>
</html>
