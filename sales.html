<!DOCTYPE html>
<html>
<head>
  <title>Sales</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="icon" type="image/png" href="assets/images/logo.png">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <!-- Toastr -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css" rel="stylesheet">

  <style>

    :root{
      --primary:#E41200;
      --secondary:#FFA600;
    }
    
    /* Inputs */
    .form-control:focus{
      border-color:var(--secondary);
      box-shadow:0 0 0 0.2rem rgba(255,166,0,0.25);
    }
    
    /* Filter button */
    #btn-filter{
      background:var(--secondary);
      border:none;
      font-weight:600;
    }
    
    #btn-filter:hover{
      background:#e69500;
    }
    
    /* Totals */
    .total-field{
      font-weight:700;
    }
    
    #div-sales-items::-webkit-scrollbar{
      width:6px;
    }
    
    #div-sales-items::-webkit-scrollbar-thumb{
      background:rgba(0,0,0,0.2);
      border-radius:3px;
    }
    
    /* Bottom nav */
    .bottom-nav a{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:0.5rem;
      color:#6c757d;
      font-size:0.85rem;
    }
    
    .bottom-nav a.active{
      color:var(--primary);
    }
    
    .bottom-nav i{
      font-size:1.5rem;
      margin-bottom:0.2rem;
    }

    #nav-logo img {
      display: block;
      margin: 0 auto;
    }
  </style>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Toastr JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/sales.js"></script>

</head>

<body>

<div class="container py-3 mb-5">

  <!-- Date Filter -->
  <div class="row g-2 mb-3 align-items-end">
  
    <!-- Start & End Date combined -->
    <div class="col">
      <label class="form-label" for="inp-start-date">Date Range</label>
      <div class="d-flex gap-2">
        <input type="date" id="inp-start-date" class="form-control">
        <span class="align-self-center">–</span>
        <input type="date" id="inp-end-date" class="form-control">
      </div>
    </div>
  
    <!-- Filter Button (icon only) -->
    <div class="col-auto d-flex align-items-end">
      <button id="btn-filter" class="btn btn-secondary" style="height: 38px;">
        <i class="bi bi-funnel"></i>
      </button>
    </div>
  
  </div>

  <!-- Totals -->
  <div class="row g-2 mb-3">
  
    <div class="col-6">
      <div class="form-floating">
        <input type="text" id="inp-total-unit-price"
               class="form-control total-field"
               value="₱0.00"
               readonly disabled>
        <label>Total Unit Price</label>
      </div>
    </div>
  
    <div class="col-6">
      <div class="form-floating">
        <input type="text" id="inp-total-selling-price"
               class="form-control total-field"
               value="₱0.00"
               readonly disabled>
        <label>Total Selling Price</label>
      </div>
    </div>
  
    <div class="col-6">
      <div class="form-floating">
        <input type="text" id="inp-total-profit"
               class="form-control total-field"
               value="₱0.00"
               readonly disabled>
        <label>Total Profit</label>
      </div>
    </div>
  
    <div class="col-6">
      <div class="form-floating">
        <input type="text" id="inp-total-quantity"
               class="form-control total-field"
               value="0.00"
               readonly disabled>
        <label>Total Quantity</label>
      </div>
    </div>
  
    <div class="col-12">
      <div class="form-floating">
        <input type="text"
               id="inp-total-amount"
               class="form-control total-field text-danger fw-bold"
               value="₱0.00"
               style="font-size:1.4rem;"
               readonly disabled>
        <label>Total Amount</label>
      </div>
    </div>
  
  </div>

  <!-- Payment Items List -->
  <div id="div-payment-items"></div>

</div>

<!-- Bottom navigation menu with plain logo -->
<nav class="navbar fixed-bottom bg-white border-top">
  <div class="container d-flex justify-content-around bottom-nav align-items-center">
    <a href="pos.html" class="text-decoration-none" id="nav-pos">
      <i class="bi bi-cash-stack"></i>
      POS
    </a>

    <a href="products.html" class="text-decoration-none" id="nav-products">
      <i class="bi bi-box-seam"></i>
      Products
    </a>

    <!-- Plain logo, not a link -->
    <div id="nav-logo">
      <img src="assets/images/logo.png" alt="Logo" style="height:40px; width:auto;">
    </div>

    <a href="sales.html" class="text-decoration-none" id="nav-sales">
      <i class="bi bi-receipt"></i>
      Sales
    </a>

    <a href="#" class="text-decoration-none" id="nav-logout">
      <i class="bi bi-box-arrow-right"></i>
      Logout
    </a>
  </div>
</nav>

<script>

if (!localStorage.getItem("isLoggedIn")) {
  window.location.href="index.html";
}

/* highlight nav */

const path = window.location.pathname.split("/").pop();

if(path==="pos.html") $("#nav-pos").addClass("active");
if(path==="products.html") $("#nav-products").addClass("active");
if(path==="sales.html") $("#nav-sales").addClass("active");

</script>

</body>
</html>
