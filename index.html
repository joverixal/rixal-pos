<!DOCTYPE html>
<html>
<head>
  <title>Rixal-POS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <!-- Toastr JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>

  <style>
    body {
      background-color: #f8f9fa; /* light background like POS */
    }

    .login-card {
      max-width: 400px;
      border-radius: 1rem;
      padding: 2rem;
    }

    .login-btn {
      background-color: #28a745;
      border: none;
      font-weight: 600;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-btn i {
      margin-right: 0.5rem;
    }

    .form-floating input {
      height: 50px;
      font-size: 1rem;
    }
  </style>
</head>
<body class="d-flex justify-content-center align-items-center vh-100">

  <div class="card login-card shadow-sm w-100">
    <div class="card-body">
      <h4 class="text-center mb-4">Rixal-POS</h4>

      <div class="form-floating mb-3">
        <input type="text" id="inp-username" class="form-control" placeholder="Username">
        <label for="inp-username">Username</label>
      </div>

      <div class="form-floating mb-4">
        <input type="password" id="inp-password" class="form-control" placeholder="Password">
        <label for="inp-password">Password</label>
      </div>

      <!-- Wrapped login button -->
      <div class="d-grid">
        <button id="btn-login" class="btn login-btn w-100">
          <i class="bi bi-box-arrow-in-right"></i> Login
        </button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/auth.js"></script>

</body>
</html>
