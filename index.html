<!DOCTYPE html>
<html>
<head>
  <title>POS Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container vh-100 d-flex justify-content-center align-items-center">
  <div class="card w-100 shadow-sm">
    <div class="card-body">
      <h4 class="text-center mb-3">POS Login</h4>

      <input type="text" id="inp-username" class="form-control mb-2" placeholder="Username">
      <input type="password" id="inp-password" class="form-control mb-3" placeholder="Password">

      <button id="btn-login" class="btn btn-primary w-100">Login</button>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/auth.js"></script>

</body>
</html>
