<!DOCTYPE html>
<html>
<head>
  <title>Rixal-POS</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="icon" type="image/png" href="assets/images/logo.png">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <!-- Toastr CSS -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css" rel="stylesheet">

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Toastr JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/auth.js"></script>

 <style>
  body {
    background-color: #f8f9fa;
    padding: 20px; /* adds space around the card */
  }

  .login-card {
    max-width: 400px;
    border-radius: 1rem;
    padding: 2rem;
    border-top: 5px solid #E41200;
    margin: 20px; /* extra margin around card */
  }

  .login-logo {
    width: 90px;
    height: auto;
    margin-bottom: 10px;
  }

  .login-title {
    color: #E41200;
    font-weight: 700;
  }

  .login-btn {
    background-color: #FFA600 !important;
    color: #fff !important;
    border: none !important;
    font-weight: 600;
    font-size: 1.25rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s ease-in-out;
    border-radius: 0.5rem;
  }

  .login-btn i {
    margin-right: 0.5rem;
  }

  /* Hover */
  .login-btn:hover {
    background-color: #e69500 !important;
  }

  /* Active */
  .login-btn:active,
  .login-btn:focus {
    background-color: #cc8400 !important;
    transform: scale(0.97);
    box-shadow: none !important;
  }

  .form-floating input {
    height: 50px;
    font-size: 1rem;
  }

  .form-control:focus {
    border-color: #FFA600;
    box-shadow: 0 0 0 0.2rem rgba(255,166,0,0.25);
  }
</style>

</style>
</head>
<body class="d-flex justify-content-center align-items-center vh-100">

  <div class="card-body text-center">

  <img src="assets/images/logo.png" class="login-logo" alt="Rixal POS Logo">

  <div class="form-floating mb-3">
    <input type="text" id="inp-username" class="form-control" placeholder="Username">
    <label for="inp-username">Username</label>
  </div>

  <div class="form-floating mb-4">
    <input type="password" id="inp-password" class="form-control" placeholder="Password">
    <label for="inp-password">Password</label>
  </div>

  <div class="d-grid">
    <button id="btn-login" class="btn login-btn w-100 py-3">
      <i class="bi bi-box-arrow-in-right me-2"></i> Login
    </button>
  </div>

</div>
  
</body>
</html>
