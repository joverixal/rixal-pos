<!DOCTYPE html>
<html>
<head>
  <title>Rixal-POS</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="icon" type="image/png" href="assets/images/logo.png">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <!-- Toastr CSS -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css" rel="stylesheet">

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Toastr JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/auth.js"></script>

  <style>
    body {
      background-color: #f8f9fa; /* light background like POS */
    }

    .login-card {
      max-width: 400px;
      border-radius: 1rem;
      padding: 2rem;
    }

    .login-btn {
      background-color: #28a745 !important;
      color: #fff !important;
      border: none !important;
      font-weight: 600;
      font-size: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease-in-out;
      border-radius: 0.5rem;
    }
    
    .login-btn i {
      margin-right: 0.5rem;
    }
    
    /* Hover */
    .login-btn:hover {
      background-color: #218838 !important; /* darker green */
      color: #fff !important;
    }
    
    /* Active / pressed */
    .login-btn:active,
    .login-btn:focus {
      background-color: #1e7e34 !important; /* even darker green */
      color: #fff !important;
      transform: scale(0.97);               /* subtle press effect */
      box-shadow: none !important;          /* remove default focus shadow */
    }

    .form-floating input {
      height: 50px;
      font-size: 1rem;
    }
  </style>
</head>
<body class="d-flex justify-content-center align-items-center vh-100">

  <div class="card login-card shadow-sm w-100 position-relative">
    <!-- Loading Overlay -->
    <div id="login-loading"
         class="position-absolute top-0 start-0 w-100 h-100 d-flex justify-content-center align-items-center bg-white"
         style="z-index:10;">
      <div class="spinner-border text-primary" role="status"></div>
    </div>
      
    <div class="card-body">
      <h4 class="text-center mb-4">Rixal-POS</h4>

      <div class="form-floating mb-3">
        <input type="text" id="inp-username" class="form-control" placeholder="Username">
        <label for="inp-username">Username</label>
      </div>

      <div class="form-floating mb-4">
        <input type="password" id="inp-password" class="form-control" placeholder="Password">
        <label for="inp-password">Password</label>
      </div>

      <!-- Wrapped login button -->
      <div class="d-grid">
        <button id="btn-login" class="btn login-btn w-100 py-3" style="font-size:1.25rem;">
          <i class="bi bi-box-arrow-in-right me-2"></i> Login
        </button>
      </div>
    </div>
  </div>
  
</body>
</html>
