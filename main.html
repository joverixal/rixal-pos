<!DOCTYPE html>
<html>
<head>
  <title>Main Menu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <style>
    /* Bottom nav button style */
    .bottom-nav a {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0.5rem;
      color: #6c757d;
      font-size: 0.9rem;
    }

    .bottom-nav a.active {
      color: #28a745; /* Active page color */
    }

    .bottom-nav i {
      font-size: 1.5rem; /* Icon size */
      margin-bottom: 0.2rem;
    }
  </style>
</head>
<body>

<div class="container py-3">
  <h4>Main Menu</h4>
</div>

<!-- Bottom navigation -->
<nav class="navbar fixed-bottom bg-white border-top">
  <div class="container d-flex justify-content-around bottom-nav">
    <a href="pos.html" class="text-decoration-none" id="nav-pos">
      <i class="bi bi-cash-stack"></i>
      POS
    </a>
    <a href="products.html" class="text-decoration-none" id="nav-products">
      <i class="bi bi-box-seam"></i>
      Products
    </a>
    <a href="sales.html" class="text-decoration-none" id="nav-sales">
      <i class="bi bi-receipt"></i>
      Sales
    </a>
  </div>
</nav>

<script>
  // Redirect if not logged in
  if (!localStorage.getItem("isLoggedIn")) {
      window.location.href = "index.html";
  }

  // Highlight active page
  const path = window.location.pathname.split("/").pop();
  if(path === "pos.html") $("#nav-pos").addClass("active");
  if(path === "products.html") $("#nav-products").addClass("active");
  if(path === "sales.html") $("#nav-sales").addClass("active");
</script>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/pos.js"></script>
  
</body>
</html>
